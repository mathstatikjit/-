<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализ числовых массивов — Гистограмма частот</title>

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body { font-family: 'Inter', sans-serif; background: #f0f4f8; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #334155 100%); }
        .input-focus:focus { outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(135deg, #4f46e5, #7c3aed); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4); }
        .table-row-hover:hover { background-color: rgba(99, 102, 241, 0.08); }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { background: linear-gradient(135deg, #f8fafc, #e2e8f0); border-left: 4px solid; }
        canvas { max-height: 500px; }
    </style>
</head>
<body class="gradient-bg">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const BAR_COLORS = [
            { bg: 'rgba(239, 68, 68, 0.75)', border: 'rgba(220, 38, 38, 1)' },
            { bg: 'rgba(249, 115, 22, 0.75)', border: 'rgba(234, 88, 12, 1)' },
            { bg: 'rgba(234, 179, 8, 0.75)', border: 'rgba(202, 138, 4, 1)' },
            { bg: 'rgba(34, 197, 94, 0.75)', border: 'rgba(22, 163, 74, 1)' },
            { bg: 'rgba(6, 182, 212, 0.75)', border: 'rgba(8, 145, 178, 1)' },
            { bg: 'rgba(99, 102, 241, 0.75)', border: 'rgba(79, 70, 229, 1)' },
            { bg: 'rgba(168, 85, 247, 0.75)', border: 'rgba(147, 51, 234, 1)' },
            { bg: 'rgba(236, 72, 153, 0.75)', border: 'rgba(219, 39, 119, 1)' },
            { bg: 'rgba(20, 184, 166, 0.75)', border: 'rgba(13, 148, 136, 1)' },
            { bg: 'rgba(251, 146, 60, 0.75)', border: 'rgba(249, 115, 22, 1)' },
            { bg: 'rgba(139, 92, 246, 0.75)', border: 'rgba(124, 58, 237, 1)' },
            { bg: 'rgba(59, 130, 246, 0.75)', border: 'rgba(37, 99, 235, 1)' },
            { bg: 'rgba(16, 185, 129, 0.75)', border: 'rgba(5, 150, 105, 1)' },
            { bg: 'rgba(244, 63, 94, 0.75)', border: 'rgba(225, 29, 72, 1)' },
            { bg: 'rgba(217, 119, 6, 0.75)', border: 'rgba(180, 83, 9, 1)' },
        ];

        function getColor(index) { return BAR_COLORS[index % BAR_COLORS.length]; }
        function fmt(val, decimals = 2) { return Number(val).toFixed(decimals); }

        function buildFrequencyTable(data, numIntervals) {
            if (!data.length || numIntervals < 1) return null;
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            const step = Math.pow(10, -Math.floor(Math.log10(range / numIntervals))) * Math.ceil((range / numIntervals) * Math.pow(10, Math.floor(Math.log10(range / numIntervals))));

            const table = [];
            let currentStart = min;

            for (let i = 0; i < numIntervals; i++) {
                const currentEnd = i === numIntervals - 1 ? max : currentStart + step;
                const count = data.filter(v => i === numIntervals - 1 ? (v >= currentStart && v <= currentEnd) : (v >= currentStart && v < currentEnd)).length;
                const relativeFreq = count / data.length;
                const density = count / (data.length * (currentEnd - currentStart || 1));

                table.push({ index: i + 1, start: currentStart, end: currentEnd, midpoint: (currentStart + currentEnd) / 2, frequency: count, relativeFreq, density, color: getColor(i) });
                currentStart = currentEnd;
            }
            return { table, min, max, range: max - min, step };
        }

        function calcStats(data) {
            if (!data.length) return null;
            const n = data.length;
            const sum = data.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const sorted = [...data].sort((a, b) => a - b);
            const median = n % 2 === 0 ? (sorted[n / 2 - 1] + sorted[n / 2]) / 2 : sorted[Math.floor(n / 2)];
            const variance = data.reduce((acc, v) => acc + (v - mean) ** 2, 0) / n;
            const stdDev = Math.sqrt(variance);
            return { n, sum: fmt(sum), mean: fmt(mean), median: fmt(median), stdDev: fmt(stdDev), min: sorted[0], max: sorted[n - 1] };
        }

        function App() {
            const [inputData, setInputData] = useState('12, 15, 18, 22, 25, 28, 30, 33, 35, 38, 40, 42, 45, 48, 50, 14, 19, 23, 27, 31, 36, 41, 44, 47, 49, 11, 16, 20, 24, 29, 32, 37, 39, 43, 46');
            const [numIntervals, setNumIntervals] = useState(7);
            const [result, setResult] = useState(null);
            const [stats, setStats] = useState(null);
            const [error, setError] = useState('');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const handleAnalyze = () => {
                setError('');
                const parsed = inputData.split(/[,\s;\n]+/).map(s => s.trim()).filter(s => s !== '').map(Number).filter(n => !isNaN(n));
                if (parsed.length < 2) { setError('Введите хотя бы 2 числовых значения.'); setResult(null); setStats(null); return; }
                if (numIntervals < 1 || numIntervals > 100) { setError('Количество интервалов должно быть от 1 до 100.'); return; }

                const freqResult = buildFrequencyTable(parsed, numIntervals);
                setResult(freqResult);
                setStats(calcStats(parsed));
            };

            useEffect(() => {
                if (!result || result.table.length === 0) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const labels = result.table.map(row => `[${fmt(row.start, 1)}; ${fmt(row.end, 1)})`);
                const bgColors = result.table.map(row => row.color.bg);
                const borderColors = result.table.map(row => row.color.border);

                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{ label: 'Частота', data: result.table.map(r => r.frequency), backgroundColor: bgColors, borderColor: borderColors, borderWidth: 2, borderRadius: 6, borderSkipped: false }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(15, 23, 42, 0.9)', titleFont: { size: 13, weight: '600' }, bodyFont: { size: 12 }, padding: 12, cornerRadius: 8,
                                callbacks: { title: (items) => `Интервал: ${items[0].label}`, label: (item) => { const row = result.table[item.dataIndex]; return [`Частота: ${row.frequency}`, `Отн. частота: ${(row.relativeFreq * 100).toFixed(1)}%`, `Плотность: ${fmt(row.density, 4)}`]; } }
                            }
                        },
                        scales: {
                            x: { title: { display: true, text: 'Интервалы', font: { size: 13, weight: '600' }, color: '#475569' }, ticks: { font: { size: 10 }, color: '#64748b', maxRotation: 45 }, grid: { display: false } },
                            y: { beginAtZero: true, title: { display: true, text: 'Частота', font: { size: 13, weight: '600' }, color: '#475569' }, ticks: { stepSize: 1, color: '#64748b' }, grid: { color: 'rgba(148,163,184,0.15)' } }
                        }
                    }
                });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [result]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="text-center mb-10">
                            <div className="inline-flex items-center gap-3 mb-3">
                                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                                    <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                                </div>
                                <h1 className="text-3xl md:text-4xl font-bold text-white">Анализ числовых массивов</h1>
                            </div>
                            <p className="text-slate-400 text-lg">Интервальная таблица • Гистограмма частот • Статистика</p>
                        </header>

                        <div className="glass-card rounded-2xl shadow-xl p-6 md:p-8 mb-8 animate-fade-in">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-semibold text-slate-700 mb-2">📊 Числовые данные (через запятую, пробел или точку с запятой)</label>
                                    <textarea className="w-full h-32 p-4 rounded-xl border border-slate-200 bg-white text-slate-800 text-sm font-mono resize-none input-focus transition" placeholder="Например: 12, 15, 18, 22, 25, 28, 30, 33, 35, 38, 40..." value={inputData} onChange={e => setInputData(e.target.value)} />
                                </div>
                                <div className="flex flex-col justify-between">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-2">📐 Количество интервалов (k)</label>
                                        <input type="number" min="1" max="100" className="w-full p-4 rounded-xl border border-slate-200 bg-white text-slate-800 text-2xl font-bold text-center input-focus transition" value={numIntervals} onChange={e => setNumIntervals(parseInt(e.target.value) || 1)} />
                                    </div>
                                    <button className="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg cursor-pointer" onClick={handleAnalyze}>🚀 Построить</button>
                                </div>
                            </div>
                            {error && <div className="mt-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm font-medium">⚠️ {error}</div>}
                        </div>

                        {stats && (
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8 animate-fade-in">
                                {[{ label: 'Кол-во (n)', value: stats.n, color: '#6366f1' }, { label: 'Сумма', value: stats.sum, color: '#3b82f6' }, { label: 'Среднее (x̄)', value: stats.mean, color: '#06b6d4' }, { label: 'Медиана', value: stats.median, color: '#10b981' }, { label: 'Стд. откл. (σ)', value: stats.stdDev, color: '#f59e0b' }, { label: 'Диапазон', value: `${fmt(stats.min, 1)} – ${fmt(stats.max, 1)}`, color: '#ef4444' }].map((s, i) => (
                                    <div key={i} className="stat-card rounded-xl p-4 shadow-md" style={{ borderLeftColor: s.color }}>
                                        <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide">{s.label}</div>
                                        <div className="text-xl font-bold text-slate-800 mt-1">{s.value}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {result && result.table.length > 0 && (
                            <div className="glass-card rounded-2xl shadow-xl p-6 md:p-8 mb-8 animate-fade-in">
                                <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-sm">📊</span>
                                    Гистограмма частот
                                </h2>
                                <div className="bg-white rounded-xl p-4 shadow-inner" style={{ height: '500px' }}>
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                        )}

                        {/* ═══════ Интервальная таблица (Транспонированная) ═══════ */}
                        {result && result.table.length > 0 && (
                            <div className="glass-card rounded-2xl shadow-xl p-6 md:p-8 animate-fade-in">
                                <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white text-sm">📋</span>
                                    Интервальная таблица
                                </h2>

                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm border-collapse">
                                        <thead>
                                            <tr className="bg-gradient-to-r from-slate-800 to-slate-700 text-white">
                                                <th className="px-4 py-3 rounded-tl-xl text-left font-semibold whitespace-nowrap">Параметр</th>
                                                {result.table.map((_, idx) => (
                                                    <th key={idx} className="px-4 py-3 text-center font-semibold whitespace-nowrap">Интервал {idx + 1}</th>
                                                ))}
                                                <th className="px-4 py-3 text-center font-semibold rounded-tr-xl whitespace-nowrap">Итого</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {/* № */}
                                            <tr className="border-b border-slate-200 bg-white">
                                                <td className="px-4 py-3 font-semibold text-slate-700 whitespace-nowrap">№</td>
                                                {result.table.map((row, idx) => (
                                                    <td key={idx} className="px-4 py-3 text-center font-mono text-slate-600">{row.index}</td>
                                                ))}
                                                <td className="px-4 py-3 text-center text-slate-500">—</td>
                                            </tr>
                                            {/* Границы */}
                                            <tr className="border-b border-slate-200 bg-slate-50">
                                                <td className="px-4 py-3 font-semibold text-slate-700 whitespace-nowrap">Интервал</td>
                                                {result.table.map((row, idx) => {
                                                    const isLast = idx === result.table.length - 1;
                                                    const label = isLast ? `[${fmt(row.start, 2)}; ${fmt(row.end, 2)}]` : `[${fmt(row.start, 2)}; ${fmt(row.end, 2)})`;
                                                    return (
                                                        <td key={idx} className="px-4 py-3 text-center font-mono text-slate-600 text-xs md:text-sm whitespace-nowrap">{label}</td>
                                                    );
                                                })}
                                                <td className="px-4 py-3 text-center text-slate-500 whitespace-nowrap">—</td>
                                            </tr>
                                            {/* Частота */}
                                            <tr className="border-b border-slate-200 bg-white">
                                                <td className="px-4 py-3 font-semibold text-slate-700 whitespace-nowrap">Частота (nᵢ)</td>
                                                {result.table.map((row, idx) => (
                                                    <td key={idx} className="px-4 py-3 text-center">
                                                        <span className="inline-block px-3 py-1 rounded-full text-white font-bold text-xs" style={{ backgroundColor: row.color.border }}>{row.frequency}</span>
                                                    </td>
                                                ))}
                                                <td className="px-4 py-3 text-center font-bold text-indigo-700">{result.table.reduce((s, r) => s + r.frequency, 0)}</td>
                                            </tr>
                                            {/* Отн. частота */}
                                            <tr className="bg-slate-50 rounded-bl-xl">
                                                <td className="px-4 py-3 font-semibold text-slate-700 whitespace-nowrap rounded-bl-xl">Отн. частота (wᵢ)</td>
                                                {result.table.map((row, idx) => (
                                                    <td key={idx} className="px-4 py-3 text-center font-mono text-slate-600 whitespace-nowrap">{(row.relativeFreq * 100).toFixed(2)}%</td>
                                                ))}
                                                <td className="px-4 py-3 text-center font-bold text-indigo-700 rounded-br-xl whitespace-nowrap">100%</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>

                                <div className="mt-6 p-4 rounded-xl bg-slate-50 border border-slate-200">
                                    <h3 className="font-semibold text-slate-700 mb-2">📐 Параметры расчёта:</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                                        <div><span className="text-slate-500">Min:</span> <span className="font-mono font-semibold">{fmt(result.min, 2)}</span></div>
                                        <div><span className="text-slate-500">Max:</span> <span className="font-mono font-semibold">{fmt(result.max, 2)}</span></div>
                                        <div><span className="text-slate-500">Диапазон (R):</span> <span className="font-mono font-semibold">{fmt(result.range, 2)}</span></div>
                                        <div><span className="text-slate-500">Шаг (h):</span> <span className="font-mono font-semibold">{fmt(result.step, 2)}</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <footer className="text-center mt-12 pb-6 text-slate-500 text-sm">
                            Анализ числовых массивов • React + Chart.js + Tailwind CSS
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
